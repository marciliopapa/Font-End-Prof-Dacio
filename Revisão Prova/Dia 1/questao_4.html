<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">

</head>
<body class="bg-copa">
    <main class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 520px;">
            <img id="imagemJogador" src="img_placeholder.png" class="card-img-top placeholder" alt="Imagem do jogador">

            <div class="card-body">
                <h1 class="card-title">Perfil do Jogador</h1>

                <p><strong>Nome Completo:</strong> <span id="nome" class="placeholder">Nome do jogador</span></p>
                <p><strong>Data de Nascimento:</strong> <span id="nascimento" class="placeholder">Data</span></p>
                <p><strong>Altura:</strong> <span id="altura" class="placeholder">Altura</span></p>
                <p><strong>Posição:</strong> <span id="posicao" class="placeholder">Posição</span></p>
                <p><strong>Rank:</strong> <span id="rank" class="placeholder">Rank</span></p>

                <button onclick="revelar()" class="btn btn-primary">Revelar</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
