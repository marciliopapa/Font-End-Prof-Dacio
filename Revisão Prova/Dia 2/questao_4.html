<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 04 - Adicionar Jogador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #eef3f8;
        }

        .area-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .card {
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }

        .card-text {
            text-align: left;
        }

        .btn {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <main class="container text-center mt-4">
        <h1>Jogadores da Copa</h1>

        <div id="areaCards" class="area-cards">
            <div class="card" style="width: 18rem;">
                <img src="neymar.png" class="card-img-top" alt="Jogador inicial">
                <div class="card-body">
                    <h5 class="card-title"><span class="badge text-bg-secondary">Neymar Jr.</span></h5>
                    <p class="card-text">
                        <strong>Data de Nascimento:</strong> 05/02/1992 (34 anos)<br>
                        <strong>Altura:</strong> 1,875m<br>
                        <strong>Posição:</strong> Horizontal / Ponta-cabeça
                    </p>
                </div>
            </div>
        </div>

        <button onclick="add()" class="btn btn-primary">Adicionar Novo Jogador</button>
    </main>

    <script src="js/bootstrap.js"></script>
    <script src="script.js"></script>
</body>
</html>
