<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Credito para Eventos</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="box">
        <h1>Credito para Eventos</h1>
        <label>Escolha o pacote:</label>

        <select id="pacote">
            <option value="50">Standard - R$50</option>
            <option value="80">Premium - R$80</option>
            <option value="120">Infinity deluxe - R$120</option>
        </select>
        <label>quantidade de pessoas:</label>

        <input type="number" id="pessoas">

        <button onclick="calcular()">
            Calcular
        </button>

        <div id="resultado">
            <p>Custo bruto: R$ 0.00</p>
            <p>Taxa de servico: R$ 0.00</p>
            <p>Desconto: R$ 0.00</p>
            <p>Total final: R$ 0.00</p>
    </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
